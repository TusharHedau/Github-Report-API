# ═══════════════════════════════════════════════════════════════════
#  GitHub Report API – Docker Compose Configuration
# ═══════════════════════════════════════════════════════════════════

services:
  report-api:
    container_name: github-report-api
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      # Forwards the GITHUB_TOKEN environment variable from the host machine to the container.
      # Users must run 'export GITHUB_TOKEN=<token>' on host before running 'docker compose up'.
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      # Tune Java options if needed (e.g. increase heap memory limits)
      - JAVA_OPTS=-XX:+UseG1GC -XX:MaxRAMPercentage=70.0 -Dspring.profiles.active=prod
    restart: unless-stopped
    healthcheck:
      # Spring Actuator health endpoint acts as container health probe.
      # Uses wget (standard in Alpine JRE) to inspect status.
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 15s
